<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chordify</title>
    <link rel="stylesheet" href="styles.css?v=10">
</head>
<body>
<main class="app">
    <section class="viewer" aria-label="Просмотр песни">
        <header class="topbar">
            <button id="openLibraryButton" class="secondary" type="button">Песни</button>
            <div class="song-heading">
                <p id="artistLabel" class="artist"></p>
                <h1 id="songTitle">Chordify</h1>
            </div>
            <div class="topbar__actions">
                <button id="editButton" class="secondary" type="button">Редактировать</button>
                <button id="deleteButton" class="danger" type="button">Удалить</button>
            </div>
        </header>
        <div id="emptyState" class="empty-state">
            <h2>Песен пока нет</h2>
            <button id="emptyAddButton" class="primary" type="button">Добавить песню</button>
        </div>
        <div id="songWorkspace" class="song-workspace">
            <div id="songView" class="song-view"></div>
            <aside id="chordPanel" class="chord-panel" aria-label="Аккорды песни"></aside>
        </div>
    </section>

    <aside id="libraryPanel" class="library-panel" aria-label="Поиск песен" hidden>
        <div class="panel-backdrop" data-close-library></div>
        <section class="library-sheet">
            <div class="library-sheet__header">
                <h2>Песни</h2>
                <button id="closeLibraryButton" class="icon-button" type="button" title="Закрыть">×</button>
            </div>
            <div class="search-row">
                <input id="searchInput" class="search" type="search" placeholder="Поиск">
                <button id="newSongButton" class="icon-button primary" type="button" title="Новая песня">+</button>
            </div>
            <ul id="songList" class="song-list"></ul>
        </section>
    </aside>

    <aside id="editorPanel" class="editor-panel" aria-label="Редактор песни" hidden>
        <div class="panel-backdrop" data-close-editor></div>
        <section class="editor-sheet">
            <form id="songForm">
                <div class="editor-sheet__header">
                    <h2 id="editorTitle">Новая песня</h2>
                    <button id="closeEditorButton" class="icon-button" type="button" title="Закрыть">×</button>
                </div>
                <label>
                    Название
                    <input id="titleInput" name="title" required autocomplete="off">
                </label>
                <label>
                    Исполнитель
                    <input id="artistInput" name="artist" autocomplete="off">
                </label>
                <div class="line-editor-field">
                    <div class="field-label">Текст и аккорды</div>
                    <div id="lineEditor" class="line-editor"></div>
                    <button id="addLineButton" class="secondary" type="button">+ строка</button>
                </div>
                <details class="parse-panel">
                    <summary>Импорт</summary>
                    <textarea id="bodyInput" name="body" spellcheck="false"></textarea>
                    <button id="parseSongButton" type="button">Разобрать</button>
                </details>
                <div class="form-actions">
                    <button class="primary" type="submit">Сохранить</button>
                    <p id="statusLine" class="status" role="status"></p>
                </div>
            </form>
        </section>
    </aside>
</main>
<script src="app.js?v=14"></script>
</body>
</html>
