services:
  app:
    build: .
    container_name: chordstorer-app
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_SECURITY_USER_NAME: ${CHORDSTORER_USERNAME:?Set CHORDSTORER_USERNAME in .env}
      SPRING_SECURITY_USER_PASSWORD: ${CHORDSTORER_PASSWORD:?Set CHORDSTORER_PASSWORD in .env}
    volumes:
      - chordstorer-data:/app/data
    restart: unless-stopped

volumes:
  chordstorer-data:
