services:
  app:
    build: .
    container_name: chordify-app
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_SECURITY_USER_NAME: ${CHORDIFY_USERNAME:?Set CHORDIFY_USERNAME in .env}
      SPRING_SECURITY_USER_PASSWORD: ${CHORDIFY_PASSWORD:?Set CHORDIFY_PASSWORD in .env}
    volumes:
      - chordify-data:/app/data
    restart: unless-stopped

volumes:
  chordify-data:
